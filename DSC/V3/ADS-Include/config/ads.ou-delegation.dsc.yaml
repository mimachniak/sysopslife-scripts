# Group created for delegating permissions on the Production-Shared OU in Active Directory. The group is created with full control permissions on the OU, allowing members of the group to manage shared resources and other objects within the OU effectively.
# no root delegation is created as Delegate OU is restricted for Domain Admins and Enterprise Admins groups only, so delegation groups are created for the child OUs only
# no security delegation is created on the root Production OU as it is restricted for Domain Admins and Enterprise Admins groups only, so delegation groups are created for the child OUs only

  - name: Active Directory Production-Groups-Distribution OU Delegation Group Permissions
    type: ActiveDirectoryDsc/ADObjectPermissionEntry
    properties: 
      Ensure: Present
      Path: "[concat('OU=Distribution,OU=Groups,OU=Production,', parameters('DomainRootPath'))]"
      IdentityReference: GDE-OU-Production-Groups-Distribution-RWD
      ActiveDirectoryRights: 
        - GenericAll
      AccessControlType: Allow
      ObjectType: 00000000-0000-0000-0000-000000000000
      ActiveDirectorySecurityInheritance: Descendents
      InheritedObjectType: Group # Group objects

  - name: Active Directory Production-Groups-Security-SecurityGeneral OU Delegation Group Permissions
    type: ActiveDirectoryDsc/ADObjectPermissionEntry
    properties: 
      Ensure: Present
      Path: "[concat('OU=SecurityGeneral,OU=Security,OU=Groups,OU=Production,', parameters('DomainRootPath'))]"
      IdentityReference: GDE-OU-Production-Groups-Security-SecurityGeneral-RWD
      ActiveDirectoryRights: 
        - GenericAll
      AccessControlType: Allow
      ObjectType: 00000000-0000-0000-0000-000000000000
      ActiveDirectorySecurityInheritance: Descendents
      InheritedObjectType: Group # Group objects




