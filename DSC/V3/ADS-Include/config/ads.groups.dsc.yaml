# Group created for delegating permissions on the Production-Shared OU in Active Directory. The group is created with full control permissions on the OU, allowing members of the group to manage shared resources and other objects within the OU effectively.
# no root delegation is created as Delegate OU is restricted for Domain Admins and Enterprise Admins groups only, so delegation groups are created for the child OUs only
# no security delegation is created on the root Production OU as it is restricted for Domain Admins and Enterprise Admins groups only, so delegation groups are created for the child OUs only

  - name: Active Directory Production-Groups-Distribution OU
    type: ActiveDirectoryDsc/ADGroup
    properties: 
      GroupName: OU-Production-Groups-Distribution-RWD
      CommonName: OU-Production-Groups-Distribution-RWD
      GroupScope: Universal 
      Category: Security
      Description: Delegation group for OU Production-Groups-Distribution with permissions to manage group
      Path: "[concat('OU=Delegation,OU=Groups,OU=Production,', parameters('DomainRootPath'))]"
      Ensure: Present


  - name: Active Directory Production-Groups-Security-SecurityGeneral OU
    type: ActiveDirectoryDsc/ADGroup
    properties: 
      GroupName: OU-Production-Groups-Security-SecurityGeneral-RWD
      CommonName: OU-Production-Groups-Security-SecurityGeneral-RWD
      GroupScope: Universal 
      Category: Security
      Description: Delegation group for OU Production-Groups-Security-SecurityGeneral with permissions to manage group
      Path: "[concat('OU=Delegation,OU=Groups,OU=Production,', parameters('DomainRootPath'))]"
      Ensure: Present




