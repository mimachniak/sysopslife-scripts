$schema: https://aka.ms/dsc/schemas/v3/bundled/config/document.json
metadata:
  name: ads-groups-ou-configuration
  version: 1.0.0
  description: Active Directory configuration of defualt groups
  Microsoft.DSC:
    requiredSecurityContext: current # this is the default and just used as an example indicating this config works for admins and non-admins

parameters:
  DomainRootPath:
    type: string
    defaultValue: "DC=contoso,DC=org"
resources:

# This configuration defines a security group for delegating permissions on the Production OU in Active Directory. The group is created with full control permissions on the OU, allowing members of the group to manage the OU and its contents effectively.

  - name: Active Directory Production OU
    type: ActiveDirectoryDsc/ADGroup
    properties: 
      GroupName: OU-Production-FullControl
      CommonName: OU-Production-FullControl
      GroupScope: Universal 
      Category: Security
      Description: Delegation group for OU Production with full control permissions
      Path: "[concat('OU=Delegation,OU=Groups,OU=Production,', parameters('DomainRootPath'))]"
      Ensure: Present



# This configuration defines a security group for delegating permissions on the Production-Accounts OU in Active Directory. The group is created with full control permissions on the OU, allowing members of the group to manage user accounts and other objects within the OU effectively.

  - name: Active Directory Production-Accounts OU
    type: ActiveDirectoryDsc/ADGroup
    properties: 
      GroupName: OU-Production-Accounts-RWD
      CommonName: OU-Production-Accounts-RWD
      GroupScope: Universal 
      Category: Security
      Description: Delegation group for OU Production-Accounts with permissions to manage accounts
      Path: "[concat('OU=Delegation,OU=Groups,OU=Production,', parameters('DomainRootPath'))]"
      Ensure: Present


  - name: Active Directory Production-Accounts-Users OU
